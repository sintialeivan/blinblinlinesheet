<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Sheet Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --cream: #faf8f5;
    --ink: #1a1a1a;
    --muted: #8a8480;
    --border: #e0ddd8;
    --accent: #c4a882;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* === EDITOR UI === */
  #app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink);
  }

  .logo span { color: var(--accent); }

  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 22px;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { background: var(--ink); color: var(--white); }

  .btn-primary {
    background: var(--ink);
    color: var(--white);
  }

  .btn-primary:hover {
    background: #3a3a3a;
  }

  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--white);
  }

  .btn-accent:hover {
    background: #b8956e;
    border-color: #b8956e;
  }

  .editor-layout {
    display: flex;
    flex: 1;
    gap: 0;
  }

  /* === SIDEBAR === */
  .sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--white);
    border-right: 1px solid var(--border);
    padding: 30px 28px;
    overflow-y: auto;
    max-height: calc(100vh - 65px);
    position: sticky;
    top: 65px;
  }

  .sidebar-section {
    margin-bottom: 32px;
  }

  .sidebar-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .field-group {
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type="text"],
  input[type="number"],
  textarea,
  select {
    width: 100%;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--ink);
    background: var(--cream);
    border: 1px solid var(--border);
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }

  input[type="text"]:focus,
  input[type="number"]:focus,
  textarea:focus,
  select:focus {
    border-color: var(--accent);
  }

  textarea { height: 80px; }

  .grid-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .color-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .color-row input[type="text"] { flex: 1; }

  .add-product-btn {
    width: 100%;
    padding: 12px;
    border: 1px dashed var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
  }

  .add-product-btn:hover {
    background: var(--accent);
    color: var(--white);
  }

  .product-tab-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  .product-tab {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 12px;
    font-weight: 400;
    transition: all 0.15s;
  }

  .product-tab.active {
    border-color: var(--ink);
    background: var(--ink);
    color: var(--white);
  }

  .product-tab:hover:not(.active) {
    border-color: var(--accent);
  }

  .product-tab .remove-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: inherit;
    opacity: 0.5;
    font-size: 14px;
    padding: 0 2px;
    line-height: 1;
  }

  .product-tab .remove-btn:hover { opacity: 1; }

  /* === CANVAS AREA === */
  .canvas-area {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    background: #ece9e3;
  }

  .canvas-hint {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* === LINE SHEET DOCUMENT === */
  #linesheet-doc {
    background: var(--white);
    width: 794px;
    min-height: 1123px;
    padding: 60px 60px 70px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.10);
    position: relative;
  }

  .doc-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 28px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 48px;
  }

  .doc-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 0.06em;
    line-height: 1;
    color: var(--ink);
  }

  .doc-meta {
    text-align: right;
  }

  .doc-collection {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .doc-season {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-top: 4px;
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(var(--cols, 2), 1fr);
    gap: 36px 32px;
  }

  .product-card {
    display: flex;
    flex-direction: column;
  }

  .product-image-box {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--cream);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .product-image-box:hover { border-color: var(--accent); }

  .product-image-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .img-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    pointer-events: none;
  }

  .img-placeholder svg { opacity: 0.4; }

  .img-placeholder span {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .img-upload-input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .product-info {
    padding: 14px 0 0;
  }

  .product-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 2px;
  }

  .product-collection-tag {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .product-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0;
  }

  .product-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 12px;
    margin-bottom: 8px;
  }

  .detail-item {}

  .detail-key {
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .detail-val {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--ink);
    margin-top: 1px;
  }

  .product-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.02em;
  }

  .product-description-text {
    font-size: 10px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.6;
    margin-top: 6px;
  }

  .doc-footer {
    margin-top: 50px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .doc-footer-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .doc-footer-contact {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-align: right;
  }

  /* Export modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    padding: 40px;
    width: 380px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.2);
  }

  .modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 12px;
    font-weight: 300;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .export-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .export-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    transition: all 0.2s;
  }

  .export-btn:hover { border-color: var(--ink); background: var(--cream); }

  .export-icon {
    font-size: 22px;
    line-height: 1;
  }

  .export-info { text-align: left; }
  .export-name {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--ink);
  }
  .export-desc {
    font-size: 10px;
    font-weight: 300;
    color: var(--muted);
    margin-top: 2px;
  }

  .close-modal {
    width: 100%;
    padding: 10px;
    border: none;
    background: transparent;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
  }

  .close-modal:hover { color: var(--ink); }

  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(250,248,245,0.9);
    z-index: 300;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .loading-overlay.open { display: flex; }

  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--muted);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Color swatches */
  .color-dots {
    display: flex;
    gap: 4px;
    margin-top: 3px;
    flex-wrap: wrap;
  }

  .color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.1);
    display: inline-block;
  }

  /* Responsive preview note */
  .preview-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .preview-tag::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">Line<span>Sheet</span> Studio</div>
    <div class="header-actions">
      <span class="preview-tag">Vista previa en vivo</span>
      <button class="btn" onclick="resetAll()">Reiniciar</button>
      <button class="btn btn-accent" onclick="openExportModal()">Exportar ↓</button>
    </div>
  </header>

  <div class="editor-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- Brand Info -->
      <div class="sidebar-section">
        <div class="sidebar-label">Marca & Catálogo</div>
        <div class="field-group">
          <label>Nombre de la marca</label>
          <input type="text" id="s-brand" value="MAISON & CO" oninput="updateDoc()">
        </div>
        <div class="field-group">
          <label>Colección</label>
          <input type="text" id="s-collection" value="Primavera — Verano 2025" oninput="updateDoc()">
        </div>
        <div class="field-group">
          <label>Temporada / Año</label>
          <input type="text" id="s-season" value="SS25" oninput="updateDoc()">
        </div>
        <div class="grid-controls">
          <div class="field-group">
            <label>Email</label>
            <input type="text" id="s-email" value="info@maison.co" oninput="updateDoc()">
          </div>
          <div class="field-group">
            <label>Teléfono</label>
            <input type="text" id="s-phone" value="+1 212 000 0000" oninput="updateDoc()">
          </div>
        </div>
        <div class="field-group">
          <label>Columnas en la grilla</label>
          <select id="s-cols" onchange="updateDoc()">
            <option value="1">1 columna</option>
            <option value="2" selected>2 columnas</option>
            <option value="3">3 columnas</option>
          </select>
        </div>
      </div>

      <!-- Products -->
      <div class="sidebar-section">
        <div class="sidebar-label">Productos</div>
        <div class="product-tab-list" id="product-tabs"></div>
        <button class="add-product-btn" onclick="addProduct()">+ Agregar producto</button>
      </div>

      <!-- Current Product Fields -->
      <div class="sidebar-section" id="product-editor">
        <div class="sidebar-label" id="product-editor-title">Producto 1</div>
        <div class="field-group">
          <label>Nombre del producto</label>
          <input type="text" id="p-name" oninput="updateProduct()">
        </div>
        <div class="field-group">
          <label>Colección (tag)</label>
          <input type="text" id="p-coltag" oninput="updateProduct()">
        </div>
        <div class="field-group">
          <label>Dimensiones</label>
          <input type="text" id="p-dims" placeholder="ej. 30 × 45 × 12 cm" oninput="updateProduct()">
        </div>
        <div class="field-group">
          <label>Colores (separados por coma)</label>
          <input type="text" id="p-colors" placeholder="Ivory, Sage, Noir" oninput="updateProduct()">
        </div>
        <div class="field-group">
          <label>Precio</label>
          <input type="text" id="p-price" placeholder="$ 0.00" oninput="updateProduct()">
        </div>
        <div class="field-group">
          <label>Descripción</label>
          <textarea id="p-desc" placeholder="Descripción breve del producto…" oninput="updateProduct()"></textarea>
        </div>
      </div>

    </aside>

    <!-- CANVAS -->
    <main class="canvas-area">
      <span class="canvas-hint">← Edita y ve los cambios en tiempo real</span>

      <div id="linesheet-doc">
        <!-- Header -->
        <div class="doc-header">
          <div class="doc-brand" id="d-brand">MAISON & CO</div>
          <div class="doc-meta">
            <div class="doc-collection" id="d-collection">Primavera — Verano 2025</div>
            <div class="doc-season" id="d-season">SS25</div>
          </div>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="products-grid" style="--cols:2"></div>

        <!-- Footer -->
        <div class="doc-footer">
          <div class="doc-footer-brand" id="d-footer-brand">MAISON & CO</div>
          <div class="doc-footer-contact">
            <div id="d-email">info@maison.co</div>
            <div id="d-phone">+1 212 000 0000</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="export-modal">
  <div class="modal">
    <h2>Exportar Line Sheet</h2>
    <p>Elige el formato de descarga para tu catálogo.</p>
    <div class="export-options">
      <button class="export-btn" onclick="exportAs('pdf')">
        <span class="export-icon">📄</span>
        <div class="export-info">
          <div class="export-name">PDF</div>
          <div class="export-desc">Ideal para enviar por email o imprimir</div>
        </div>
      </button>
      <button class="export-btn" onclick="exportAs('jpeg')">
        <span class="export-icon">🖼</span>
        <div class="export-info">
          <div class="export-name">JPEG</div>
          <div class="export-desc">Imagen comprimida para redes sociales</div>
        </div>
      </button>
      <button class="export-btn" onclick="exportAs('png')">
        <span class="export-icon">✦</span>
        <div class="export-info">
          <div class="export-name">PNG</div>
          <div class="export-desc">Alta calidad con transparencia</div>
        </div>
      </button>
    </div>
    <button class="close-modal" onclick="closeExportModal()">Cancelar</button>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Generando archivo…</div>
</div>

<script>
  // ===== STATE =====
  let products = [
    { id: 1, name: 'Vestido Éclat', coltag: 'SS25', dims: '90 × 130 cm', colors: 'Ivory, Blush, Noir', price: '$ 240.00', desc: 'Vestido midi de seda dupioni con escote en V y cierre de nácar. Corte recto de línea depurada.', img: null },
    { id: 2, name: 'Blusa Lumière', coltag: 'SS25', dims: '60 × 80 cm', colors: 'Sage, Cream', price: '$ 115.00', desc: 'Blusa de georgette ligero con manga tres cuartos y detalles de bordado tonal.', img: null },
    { id: 3, name: 'Pantalón Minuit', coltag: 'SS25', dims: '75 × 110 cm', colors: 'Charcoal, Sand', price: '$ 175.00', desc: 'Pantalón de corte wide-leg en lino italiano. Pinzas frontales y cintura elástica trasera.', img: null },
    { id: 4, name: 'Chaqueta Rivière', coltag: 'SS25', dims: '85 × 65 cm', colors: 'Ecru', price: '$ 320.00', desc: 'Chaqueta sastre en tweed artesanal. Solapa cuadrada y bolsillos de parche.', img: null },
  ];

  let activeProductId = 1;
  let nextId = 5;

  // ===== INIT =====
  function init() {
    renderProductTabs();
    selectProduct(activeProductId);
    renderGrid();
  }

  // ===== DOC UPDATE =====
  function updateDoc() {
    document.getElementById('d-brand').textContent = document.getElementById('s-brand').value;
    document.getElementById('d-collection').textContent = document.getElementById('s-collection').value;
    document.getElementById('d-season').textContent = document.getElementById('s-season').value;
    document.getElementById('d-email').textContent = document.getElementById('s-email').value;
    document.getElementById('d-phone').textContent = document.getElementById('s-phone').value;
    document.getElementById('d-footer-brand').textContent = document.getElementById('s-brand').value;
    const cols = document.getElementById('s-cols').value;
    document.getElementById('products-grid').style.setProperty('--cols', cols);
  }

  // ===== PRODUCT MANAGEMENT =====
  function renderProductTabs() {
    const list = document.getElementById('product-tabs');
    list.innerHTML = '';
    products.forEach(p => {
      const div = document.createElement('div');
      div.className = 'product-tab' + (p.id === activeProductId ? ' active' : '');
      div.innerHTML = `<span>${p.name || 'Producto'}</span><button class="remove-btn" onclick="removeProduct(event,${p.id})">×</button>`;
      div.addEventListener('click', () => selectProduct(p.id));
      list.appendChild(div);
    });
  }

  function selectProduct(id) {
    activeProductId = id;
    const p = products.find(x => x.id === id);
    if (!p) return;
    document.getElementById('product-editor-title').textContent = p.name || 'Producto';
    document.getElementById('p-name').value = p.name;
    document.getElementById('p-coltag').value = p.coltag;
    document.getElementById('p-dims').value = p.dims;
    document.getElementById('p-colors').value = p.colors;
    document.getElementById('p-price').value = p.price;
    document.getElementById('p-desc').value = p.desc;
    renderProductTabs();
  }

  function updateProduct() {
    const p = products.find(x => x.id === activeProductId);
    if (!p) return;
    p.name = document.getElementById('p-name').value;
    p.coltag = document.getElementById('p-coltag').value;
    p.dims = document.getElementById('p-dims').value;
    p.colors = document.getElementById('p-colors').value;
    p.price = document.getElementById('p-price').value;
    p.desc = document.getElementById('p-desc').value;
    document.getElementById('product-editor-title').textContent = p.name || 'Producto';
    renderProductTabs();
    renderGrid();
  }

  function addProduct() {
    const p = { id: nextId++, name: 'Nuevo Producto', coltag: '', dims: '', colors: '', price: '', desc: '', img: null };
    products.push(p);
    selectProduct(p.id);
    renderGrid();
  }

  function removeProduct(e, id) {
    e.stopPropagation();
    if (products.length <= 1) return;
    products = products.filter(x => x.id !== id);
    if (activeProductId === id) selectProduct(products[0].id);
    renderProductTabs();
    renderGrid();
  }

  // ===== GRID RENDER =====
  function renderGrid() {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '';
    products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.setAttribute('data-id', p.id);

      // Colors dots
      const colorArr = p.colors ? p.colors.split(',').map(c => c.trim()).filter(Boolean) : [];
      const colorNames = colorArr.map(c => `<span class="detail-val">${c}</span>`).join(', ');
      const colorDots = colorArr.map(c => {
        const named = cssColorNames[c.toLowerCase()] || c;
        return `<span class="color-dot" style="background:${named}" title="${c}"></span>`;
      }).join('');

      // Image
      const imgContent = p.img
        ? `<img src="${p.img}" alt="${p.name}">`
        : `<div class="img-placeholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21,15 16,10 5,21"/>
            </svg>
            <span>Agregar foto</span>
          </div>`;

      card.innerHTML = `
        <div class="product-image-box" title="Click para agregar foto">
          ${imgContent}
          <input type="file" accept="image/*" class="img-upload-input" data-pid="${p.id}" onchange="handleImageUpload(event,${p.id})">
        </div>
        <div class="product-info">
          <div class="product-name">${p.name || '—'}</div>
          ${p.coltag ? `<div class="product-collection-tag">${p.coltag}</div>` : ''}
          <div class="product-divider"></div>
          <div class="product-details">
            ${p.dims ? `<div class="detail-item"><div class="detail-key">Dimensiones</div><div class="detail-val">${p.dims}</div></div>` : ''}
            ${p.price ? `<div class="detail-item"><div class="detail-key">Precio</div><div class="product-price">${p.price}</div></div>` : ''}
            ${colorArr.length ? `<div class="detail-item" style="grid-column:1/-1"><div class="detail-key">Colores</div><div class="color-dots">${colorDots}</div><div style="font-size:10px;font-weight:300;color:#8a8480;margin-top:2px">${colorArr.join(' · ')}</div></div>` : ''}
          </div>
          ${p.desc ? `<div class="product-description-text">${p.desc}</div>` : ''}
        </div>`;
      grid.appendChild(card);
    });
  }

  // Color name to hex mapping (basic)
  const cssColorNames = {
    ivory: '#fffff0', blush: '#f0888a', noir: '#1a1a1a', sage: '#8fa67a',
    cream: '#fffdd0', charcoal: '#36454f', sand: '#c2b280', ecru: '#c2b280',
    black: '#000', white: '#fff', gold: '#c4a882', champagne: '#f7e7ce',
    taupe: '#8b7d6b', beige: '#f5f5dc', navy: '#001f5b', rose: '#ff007f'
  };

  function handleImageUpload(e, id) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const p = products.find(x => x.id === id);
      if (p) { p.img = ev.target.result; renderGrid(); }
    };
    reader.readAsDataURL(file);
  }

  // ===== EXPORT =====
  function openExportModal() { document.getElementById('export-modal').classList.add('open'); }
  function closeExportModal() { document.getElementById('export-modal').classList.remove('open'); }

  async function exportAs(format) {
    closeExportModal();
    const loading = document.getElementById('loading');
    loading.classList.add('open');

    const el = document.getElementById('linesheet-doc');

    // Hide upload inputs for clean export
    document.querySelectorAll('.img-upload-input').forEach(x => x.style.display = 'none');

    await new Promise(r => setTimeout(r, 100));

    try {
      const canvas = await html2canvas(el, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false
      });

      const brand = (document.getElementById('s-brand').value || 'linesheet').replace(/\s+/g,'_').toLowerCase();
      const filename = `${brand}_linesheet`;

      if (format === 'pdf') {
        const { jsPDF } = window.jspdf;
        const imgData = canvas.toDataURL('image/png', 1.0);
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
        const pdfW = pdf.internal.pageSize.getWidth();
        const pdfH = (canvas.height * pdfW) / canvas.width;
        pdf.addImage(imgData, 'PNG', 0, 0, pdfW, pdfH);
        pdf.save(`${filename}.pdf`);
      } else {
        const type = format === 'jpeg' ? 'image/jpeg' : 'image/png';
        const quality = format === 'jpeg' ? 0.95 : 1.0;
        const dataUrl = canvas.toDataURL(type, quality);
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = `${filename}.${format}`;
        a.click();
      }
    } catch (err) {
      alert('Error al exportar. Intenta de nuevo.');
      console.error(err);
    }

    document.querySelectorAll('.img-upload-input').forEach(x => x.style.display = '');
    loading.classList.remove('open');
  }

  function resetAll() {
    if (!confirm('¿Reiniciar todo el catálogo?')) return;
    location.reload();
  }

  init();
</script>
</body>
</html>
